name: Bulk Image Sync

on:
  push:
    paths:
      - 'images.txt'  # 当你修改列表文件并上传时触发
  workflow_dispatch:   # 支持手动点击按钮触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install skopeo
        run: sudo apt-get update && sudo apt-get install -y skopeo

      - name: Login to Destination Registry
        run: |
          skopeo login --username "${{ secrets.DEST_USERNAME }}" --password "${{ secrets.DEST_PASSWORD }}" ${{ secrets.DEST_REGISTRY }}

      - name: Sync Images
        run: |
          # 循环读取 images.txt 中的每一行
          while IFS= read -r image || [ -n "$image" ]; do
            if [[ -z "$image" || "$image" =~ ^# ]]; then continue; fi
            
            echo "Syncing $image..."
            
            # 将 docker.io/library/nginx 转换为 阿里云地址
            # 假设你的阿里云命名空间是 my-space
            NAMESPACE="your-namespace" 
            
            # 执行同步：从 Docker Hub 同步到 阿里云
            skopeo copy --all \
              docker://docker.io/$image \
              docker://${{ secrets.DEST_REGISTRY }}/$NAMESPACE/$image
              
            echo "Finished syncing $image"
          done < images.txt
