name: Bulk Download Docker Images to Artifact

on:
  workflow_dispatch:
    inputs:
      image_names:
        description: '请输入镜像列表（每行一个，例如：nginx:latest）'
        required: true
        type: string
        default: |
          nginx:latest
          redis:6-alpine
          mysql:8.0

jobs:
  download-images:
    runs-on: ubuntu-latest
    steps:
      - name: Create Workspace Folder
        run: mkdir -p ./docker_images

      - name: Pull and Save Docker Images
        run: |
          # 将输入的多行字符串保存到临时文件
          echo "${{ github.event.inputs.image_names }}" > image_list.txt
          
          # 循环处理每一行
          while IFS= read -r image || [ -n "$image" ]; do
            # 忽略空行和注释
            [[ -z "$image" || "$image" =~ ^# ]] && continue
            
            # 去除首尾空格
            image=$(echo "$image" | xargs)
            
            echo "------------------------------------------"
            echo "Processing: $image"
            
            # 拉取镜像
            if docker pull "$image"; then
              # 转换文件名为合法字符
              CLEAN_NAME=$(echo "$image" | sed 's/[\/:]/_/g')
              FILENAME="./docker_images/${CLEAN_NAME}.tar"
              
              # 保存镜像
              docker save -o "$FILENAME" "$image"
              echo "Successfully saved $image to $FILENAME"
            else
              echo "Error: Failed to pull $image"
            fi
          done < image_list.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bulk-docker-images
          path: ./docker_images/
          retention-days: 1  # 节省存储空间，保留1天
